name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub UI

env:
  AWS_REGION: us-east-1
  TF_VERSION: 1.7.0
  PYTHON_VERSION: "3.12"

jobs:
  # ── Job 1: Run unit tests ─────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Run shared tests
        run: PYTHONPATH=src python -m unittest discover -s tests -p "test_*.py" -v

      - name: Run module tests
        run: |
          for module_dir in modules/*/; do
            module_name=$(basename "$module_dir")
            echo "--- Testing module: $module_name ---"
            PYTHONPATH="src:${module_dir}src" python -m unittest discover \
              -s "${module_dir}tests" -p "test_*.py" -v
          done

      - name: Test local pipeline (no AWS)
        run: |
          mkdir -p output
          PYTHONPATH="src:modules/adobe/src" python \
            modules/adobe/src/adobe/analyzer.py data/adobe/data.sql -o output/
          ls -la output/

  # ── Job 2: Package Lambda & upload artifact ───────────────────────────────
  package:
    name: Package Lambda
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Lambda zip
        run: |
          mkdir -p dist staging/shared
          # Copy shared utilities (dq_checker, base_handler)
          cp -r src/shared/. staging/shared/
          # Copy each pipeline module's source package
          # Each module's src/ contains a package named after the module (e.g. adobe/)
          for module_dir in modules/*/; do
            cp -r "${module_dir}src/." staging/
          done
          cd staging && zip -r ../dist/lambda.zip . --exclude "*__pycache__*" "*.pyc"
          echo "Lambda package size: $(du -sh ../dist/lambda.zip | cut -f1)"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-package-${{ github.sha }}
          path: dist/lambda.zip
          retention-days: 30

  # ── Job 3: Terraform plan (PRs only — no deploy) ──────────────────────────
  terraform-plan:
    name: Terraform Plan (PR Check)
    needs: package
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package-${{ github.sha }}
          path: dist/

      - name: Stage pipeline Terraform configs
        run: |
          # Each module owns its pipeline.tf; copy into terraform/ so Terraform sees it.
          for module_dir in modules/*/; do
            module_name=$(basename "$module_dir")
            cp "${module_dir}terraform/pipeline.tf" "terraform/${module_name}_pipeline.tf"
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: terraform
        run: terraform fmt -check

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: terraform plan -no-color -out=tfplan 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const planOutput = fs.readFileSync('terraform/plan_output.txt', 'utf8');
            const truncated = planOutput.length > 60000
              ? planOutput.substring(0, 60000) + '\n... (truncated)'
              : planOutput;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan\n\`\`\`hcl\n${truncated}\n\`\`\``
            });

  # ── Job 4: Terraform deploy (main branch only) ────────────────────────────
  deploy:
    name: Deploy to AWS
    needs: package
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Lambda artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-package-${{ github.sha }}
          path: dist/

      - name: Stage pipeline Terraform configs
        run: |
          # Each module owns its pipeline.tf; copy into terraform/ so Terraform sees it.
          for module_dir in modules/*/; do
            module_name=$(basename "$module_dir")
            cp "${module_dir}terraform/pipeline.tf" "terraform/${module_name}_pipeline.tf"
          done

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Clean up old Athena workgroup
        run: |
          aws athena delete-work-group \
            --work-group search-keyword-analyzer-dev \
            --recursive-delete-option \
            2>/dev/null && echo "Deleted old workgroup" || echo "Workgroup not found or already deleted"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Show outputs
        working-directory: terraform
        run: terraform output
